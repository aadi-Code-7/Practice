<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>

    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: gray;">
    
    <div class="header">
        <h2>ToDo List</h2>
    </div>
        
    <div class="main">
        <div class="container">

            <form>
            <div class="upper">
                <div class="input">
                    <p>Enter your task</p>
                    <span>
                        <input type="text" placeholder="Enter your task here" maxlength="50" required>
                        <button id="addBtn" style="background-color: rgb(151, 196, 83); color: whitesmoke;">Add</button>
                    </span>
                </div>
            </div>
            </form>
            <div class="lower">
                <div class="tasks">
                    <div class="taskList">
                       
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
