<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="main">
        <div class="board">
            <div class="box red Container">
                <div class="Board">
                    <div class="red dice"></div>
                    <div class="red dice"></div>
                    <div class="red dice"></div>
                    <div class="red dice"></div>
                </div>
            </div>
            <div class="path1"></div>
            <div class="box Green Container">
                <div class="Board">
                    <div class="Green dice"></div>
                    <div class="Green dice"></div>
                    <div class="Green dice"></div>
                    <div class="Green dice"></div>
                </div>
            </div>
            <div class="path2"></div>

            <div class="box goal">
                <div class="triangle redTriangle"></div>
                <div class="triangle greenTriangle"></div>
                <div class="triangle yellowTriangle"></div>
                <div class="triangle blueTriangle"></div>

            </div>

            <div class="path3"></div>
            <div class="box Yellow Container">
                <div class="Board">
                    <div class="Yellow dice"></div>
                    <div class="Yellow dice"></div>
                    <div class="Yellow dice"></div>
                    <div class="Yellow dice"></div>
                </div>
            </div>
            <div class="path4"></div>
            <div class="box Blue Container">
                <div class="Board">
                    <div class="Blue dice"></div>
                    <div class="Blue dice"></div>
                    <div class="Blue dice"></div>
                    <div class="Blue dice"></div>
                </div>
            </div>
        </div>
    </div>


    <script src="app.js"></script>
</body>
</html>
